name: release

# Tag a commit (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to cut a
# release: builds every target and attaches the binaries + checksums to a
# GitHub Release with auto-generated notes.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: tests (race)
        run: make race
      - name: build release binaries
        run: make release VERSION="${{ github.ref_name }}"
      - name: checksums
        run: cd dist && sha256sum ipsupport-code-* > checksums.txt
      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
