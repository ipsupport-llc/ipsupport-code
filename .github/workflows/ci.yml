name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: make fmtcheck
      - name: go vet
        run: make vet
      - name: tests (race)
        run: make race
      # Almost all code is pure, cross-platform Go, so a host build proves it
      # compiles everywhere. The few GOOS-specific files (procgroup_*, sandbox
      # wrap_*) are cross-compiled below; the full release matrix is built on
      # tags (release.yml) and daily (nightly.yml).
      - name: build (host)
        run: make build
      - name: build (darwin/windows cross)
        run: GOOS=darwin GOARCH=arm64 go build ./... && GOOS=windows GOARCH=amd64 go build ./...

  # The macOS sandbox (Seatbelt) can only be exercised on macOS, so run the
  # sandbox package's tests there — they execute real sandbox-exec confinement.
  sandbox-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: sandbox tests (real Seatbelt)
        run: go test ./internal/sandbox/...
