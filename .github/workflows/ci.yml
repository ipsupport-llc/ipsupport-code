name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: make fmtcheck
      - name: go vet
        run: make vet
      - name: tests (race)
        run: make race
      # The code is pure, cross-platform Go (no build tags / GOOS-specific files),
      # so a host build proves it compiles everywhere — no need to cross-compile
      # all 5 targets on every push. The full matrix is built on tags
      # (release.yml) and daily (nightly.yml).
      - name: build (host)
        run: make build
