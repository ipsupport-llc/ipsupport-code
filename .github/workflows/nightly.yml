name: nightly

# A rolling pre-release that tracks main: rebuilt on every push to main (so it
# never lags behind a merge), with a daily cron as a backstop and on-demand
# dispatch. The `nightly` tag/release is replaced each run, so its assets always
# track the latest main.
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily (backstop)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: tests (race)
        run: make race
      - name: build & package archives
        run: make archives VERSION="nightly-$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)"
      - name: publish rolling nightly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          gh release create nightly \
            dist/*.tar.gz dist/*.zip dist/checksums.txt \
            --prerelease \
            --title "Nightly build" \
            --notes "Automated build from main — commit $(git rev-parse --short HEAD), $(date -u +%Y-%m-%d). Pre-release; not a stable version."
